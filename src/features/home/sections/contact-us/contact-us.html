<section class="contact-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="contact-form-card">
          <h3 class="contact-title text-center mb-4">Контактирајте не</h3>

          <form class="contact-form" action="https://usebasin.com/f/your-contact-form-id" method="POST">
            <div class="row g-3">
              <div class="col-12">
                <label for="contactFullName" class="form-label">Име и презиме</label>
                <input type="text" class="form-control" id="contactFullName" name="fullName" placeholder="Целосно име и презиме" required>
              </div>

              <div class="col-12">
                <label for="contactEmail" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="contactEmail" name="email" placeholder="E-mail адреса" required>
              </div>

              <div class="col-12">
                <label for="contactMessage" class="form-label">Порака</label>
                <textarea class="form-control" id="contactMessage" name="message" rows="5" placeholder="Внесете ја пораката..." required></textarea>
              </div>

              <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary-pink">Испратете</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
