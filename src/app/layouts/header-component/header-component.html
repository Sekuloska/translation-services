
<header class="th-header">
  <nav class="navbar navbar-expand-lg">
      <div class="container">

          <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
              <img height="32" src="assets/logo.png">
              <span class="th-logo-text">ТРАНСХАУСА</span>
          </a>

          <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="mainNavbar">
              <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-4">
                  <li class="nav-item">
                      <a class="nav-link header-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Почетна</a>
                  </li>

                  <li class="nav-item">
                      <a class="nav-link header-link" routerLink="/our-story" routerLinkActive="active">Наша приказна</a>
                  </li>
                  <li class="nav-item">
                      <a class="nav-link header-link" routerLink="/services" routerLinkActive="active">Услуги</a>
                  </li>
              </ul>

          </div>

      </div>

  </nav>
</header>
